<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shantucket</title>
  <meta name="description" content="A map of our favorite places on Nantucket." />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Shantucket</h1>
    <p class="subtitle">A map of our favorite places on the island.</p>
    <div id="filters" aria-label="Filter places by type"></div>
  </header>
  <main>
    <div id="map" role="application" aria-label="Map of favorite places on Nantucket"></div>
  </main>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
